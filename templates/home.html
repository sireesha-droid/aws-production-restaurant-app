{% extends "base.html" %}

{% block title %}Home - Spice Route{% endblock %}

{% block content %}

<style>
.hero{
    background:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
    height:80vh;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,0.55);
}

.hero-content{
    position:relative;
    z-index:2;
    color:white;
    text-align:center;
    padding-top:170px;
}

.hero h1{
    font-size:60px;
    font-weight:bold;
}

.hero p{
    font-size:24px;
    margin-top:20px;
}

.btn-order{
    background:#ff6b00;
    color:white;
    padding:15px 35px;
    border-radius:50px;
    text-decoration:none;
    font-size:22px;
    transition:.3s;
}

.btn-order:hover{
    background:#ff4500;
    color:white;
}
</style>

<div class="hero">

<div class="overlay"></div>

<div class="hero-content">

<h1>🍽 Welcome to Spice Route</h1>

<p>Delicious food made with love and delivered fresh to your doorstep.</p>

<br>

<a href="{{ url_for('menu') }}" class="btn-order">
Explore Our Menu
</a>

</div>

</div>

{% endblock %}

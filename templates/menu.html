{% extends "base.html" %}
{% block title %}Menu - Spice Route{% endblock %}
{% block content %}
<h2>Our Menu</h2>
<div class="row">
    {% for item in items %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">{{ item.name }}</h5>
                <h6 class="card-subtitle mb-2 text-muted">{{ item.category }}</h6>
                <p class="card-text">₹{{ item.price }}</p>
                <form method="POST" action="{{ url_for('add_to_cart', item_id=item.id) }}">
                    <button type="submit" class="btn btn-outline-primary btn-sm">Add to Cart</button>
                </form>
            </div>
        </div>
    </div>
    {% else %}
    <p>No menu items yet. Check back soon!</p>
    {% endfor %}
</div>
{% endblock %}

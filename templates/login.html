{% extends "base.html" %}
{% block title %}Login - Spice Route{% endblock %}

{% block content %}

<style>

body{
    background:#f5f5f5;
}

.login-bg{
    background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
    height:88vh;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

.login-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.60);
}

.login-card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:40px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.login-card h2{
    text-align:center;
    margin-bottom:30px;
    font-weight:bold;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.btn-login{
    width:100%;
    background:#ff6b00;
    color:white;
    border:none;
    border-radius:30px;
    padding:12px;
    font-size:18px;
    transition:.3s;
}

.btn-login:hover{
    background:#e65100;
}

.login-footer{
    text-align:center;
    margin-top:20px;
}

.login-footer a{
    color:#ffd166;
    text-decoration:none;
    font-weight:bold;
}

.login-footer a:hover{
    text-decoration:underline;
}

.eye-btn{
    cursor:pointer;
    background:white;
    border-left:none;
}

</style>

<div class="login-bg">

<div class="login-overlay"></div>

<div class="login-card">

<h2>🍽 Welcome Back</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">👤 Username</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter Username"
required>

</div>

<div class="mb-3">

<label class="form-label">🔒 Password</label>

<div class="input-group">

<input
type="password"
id="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

<button
class="btn eye-btn"
type="button"
onclick="togglePassword()">

👁️

</button>

</div>

</div>

<button class="btn-login">

Login

</button>

</form>

<div class="login-footer">

<p>

Don't have an account?

<a href="{{ url_for('register') }}">

Register Now

</a>

</p>

</div>

</div>

</div>

<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}

else{

x.type="password";

}

}

</script>

{% endblock %}

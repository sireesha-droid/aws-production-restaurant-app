{% extends "base.html" %}
{% block title %}Order Status - Spice Route{% endblock %}
{% block content %}
<h2>Order #{{ order.id }}</h2>
<p>Status: <span class="badge bg-info">{{ order.status }}</span></p>

<a href="{{ url_for('menu') }}" class="btn btn-primary">Order More</a>
{% endblock %}
